<!DOCTYPE html>
<html lang="pt-br">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>FlorIA | Sua IA Botânica</title>
	<link rel="stylesheet" href="projeto.css">
	<link rel="shortcut icon" href="img/favicon.ico" type="image/x-icon">
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
	<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
	<div class="container">
		<button class="mobile-menu-btn" id="mobile-toggle">
			<span class="material-symbols-outlined">menu</span>
		</button>

		<aside class="sidebar" id="sidebar">
			<div class="logo-wrapper">
				<img src="img/image-removebg-preview.png" alt="Logo FlorIA" class="logo" onerror="this.src='https://placehold.co/80x80/1e4d1f/FFF?text=F'">
			</div>
			<button class="new-chat-btn" id="new-chat-btn">
				<span class="material-symbols-outlined">add</span>
				Novo Chat
			</button>

			<div class="history-container">
				<h3 class="history-title">Conversas Anteriores</h3>
				<ul class="history-list" id="history-list">
					</ul>
			</div>
			
			<a href="index.html" class="back-home-btn" style="margin-top: auto; padding: 16px; text-align: center; color: var(--texto-secundario); text-decoration: none; font-size: 0.9rem;">
				<span class="material-symbols-outlined" style="vertical-align: middle; font-size: 1.2rem;">home</span> Início
			</a>
		</aside>

		<main class="main-content">
			<header class="top-bar">
				<div class="theme-icon" id="theme-toggle" title="Mudar Tema">
					<span class="material-symbols-outlined" id="theme-icon-span">dark_mode</span>
				</div>
			</header>

			<div id="welcome-screen" class="welcome-screen">
				<div class="mascot">
					<img src="img/mascote planta.png" alt="Mascote FlorIA" onerror="this.src='https://placehold.co/200x200/287a2c/FFF?text=FlorIA'">
				</div>
				<h1>FlorIA</h1>
				<p class="subtitle">Como posso ajudar as tuas plantas hoje?</p>
			</div>

			<div id="chat-history" class="chat-history" style="display: none;"></div>

			<div class="input-container">
				<form class="question-form" id="chat-form">
					<div class="input-wrapper">
						<input type="text" id="chat-input" placeholder="Pergunta à FlorIA sobre plantas..." required autocomplete="off">
						<button type="submit" class="send-btn" title="Enviar">
							<span class="material-symbols-outlined">send</span>
						</button>
					</div>
				</form>
				<p class="disclaimer">A FlorIA pode cometer erros ao identificar espécies. Verifica sempre as informações sensíveis.</p>
			</div>
		</main>
	</div>

	<script>
		const BACKEND_URL = 'http://127.0.0.1:5000/api/chat';

		const themeToggle = document.getElementById('theme-toggle');
		const themeIconSpan = document.getElementById('theme-icon-span');
		const body = document.body;
		const chatForm = document.getElementById('chat-form');
		const chatInput = document.getElementById('chat-input');
		const chatHistory = document.getElementById('chat-history');
		const welcomeScreen = document.getElementById('welcome-screen');
		const newChatBtn = document.getElementById('new-chat-btn');
		const mobileToggle = document.getElementById('mobile-toggle');
		const sidebar = document.getElementById('sidebar');
		const historyList = document.getElementById('history-list');

		const savedTheme = localStorage.getItem('floria-theme');
		if (savedTheme === 'dark') {
			body.classList.add('dark-mode');
			themeIconSpan.textContent = 'light_mode';
		}

		themeToggle.addEventListener('click', () => {
			body.classList.toggle('dark-mode');
			const isDark = body.classList.contains('dark-mode');
			themeIconSpan.textContent = isDark ? 'light_mode' : 'dark_mode';
			localStorage.setItem('floria-theme', isDark ? 'dark' : 'light');
		});

		mobileToggle.addEventListener('click', () => {
			sidebar.classList.toggle('active');
		});

		let sessions = JSON.parse(localStorage.getItem('floria-sessions')) || [];
		let currentSessionId = null;

		function saveSessions() {
			localStorage.setItem('floria-sessions', JSON.stringify(sessions));
			renderSidebar();
		}

		function renderSidebar() {
			historyList.innerHTML = '';
			
			[...sessions].reverse().forEach(session => {
				const li = document.createElement('li');
				li.classList.add('history-item');
				if (session.id === currentSessionId) li.classList.add('active');
				
				const contentDiv = document.createElement('div');
				contentDiv.classList.add('history-item-content');
				contentDiv.innerHTML = `
					<span class="material-symbols-outlined">psychiatry</span>
					<span>${session.title}</span>
				`;
				contentDiv.addEventListener('click', () => loadSession(session.id));

				const deleteBtn = document.createElement('span');
				deleteBtn.classList.add('material-symbols-outlined', 'delete-btn');
				deleteBtn.textContent = 'delete';
				deleteBtn.title = 'Excluir chat';
				deleteBtn.addEventListener('click', (e) => {
					e.stopPropagation(); 
					deleteSession(session.id);
				});
				
				li.appendChild(contentDiv);
				li.appendChild(deleteBtn);
				historyList.appendChild(li);
			});
		}

		function loadSession(id) {
			currentSessionId = id;
			const session = sessions.find(s => s.id === id);
			if (!session) return;
			
			chatHistory.innerHTML = '';
			welcomeScreen.style.display = 'none';
			chatHistory.style.display = 'flex';
			
			session.messages.forEach(msg => addMessageToUI(msg.text, msg.sender, false));
			
			renderSidebar();
			if(window.innerWidth <= 768) sidebar.classList.remove('active');
		}

		function deleteSession(id) {
			sessions = sessions.filter(s => s.id !== id);
			saveSessions();
			
			if (currentSessionId === id) {
				currentSessionId = null;
				chatHistory.innerHTML = '';
				chatHistory.style.display = 'none';
				welcomeScreen.style.display = 'flex';
			}
		}

		newChatBtn.addEventListener('click', () => {
			currentSessionId = null;
			chatHistory.innerHTML = '';
			chatHistory.style.display = 'none';
			welcomeScreen.style.display = 'flex';
			renderSidebar();
			if(window.innerWidth <= 768) sidebar.classList.remove('active');
		});

		renderSidebar();

		function showTypingIndicator() {
			const typingDiv = document.createElement('div');
			typingDiv.classList.add('chat-message', 'bot-message', 'typing-indicator-wrapper');
			typingDiv.id = 'typing-indicator';
			typingDiv.innerHTML = `
				<div class="message-bubble">
					<div class="typing-dots">
						<span></span><span></span><span></span>
					</div>
				</div>
			`;
			chatHistory.appendChild(typingDiv);
			scrollToBottom();
		}

		function removeTypingIndicator() {
			const indicator = document.getElementById('typing-indicator');
			if (indicator) indicator.remove();
		}

		function addMessageToUI(message, sender, save = true) {
			const messageDiv = document.createElement('div');
			messageDiv.classList.add('chat-message', `${sender}-message`);
			
			const bubble = document.createElement('div');
			bubble.classList.add('message-bubble');
			
			if (sender === 'bot') {
				bubble.innerHTML = marked.parse(message);
			} else if (sender === 'user') {
				bubble.innerHTML = message.replace(/\n/g, '<br>');
			} else {
				bubble.innerHTML = message;
			}
			
			messageDiv.appendChild(bubble);
			chatHistory.appendChild(messageDiv);
			
			if (save && sender !== 'error') {
				const session = sessions.find(s => s.id === currentSessionId);
				if (session) {
					session.messages.push({ text: message, sender: sender });
					saveSessions();
				}
			}
			
			scrollToBottom();
		}

		function scrollToBottom() {
			chatHistory.scrollTo({ top: chatHistory.scrollHeight, behavior: 'smooth' });
		}

		chatForm.addEventListener('submit', async (e) => {
			e.preventDefault(); 
			const userText = chatInput.value.trim();
			if (!userText) return;

			if (!currentSessionId) {
				currentSessionId = Date.now().toString(); 
				const newTitle = userText.length > 25 ? userText.substring(0, 25) + '...' : userText;
				sessions.push({ id: currentSessionId, title: newTitle, messages: [] });
			}

			// Prepara o histórico da sessão atual para a memória da IA
			const currentSession = sessions.find(s => s.id === currentSessionId);
			const historyToSend = currentSession.messages
				.filter(msg => msg.sender !== 'error')
				.map(msg => ({
					role: msg.sender === 'user' ? 'user' : 'assistant',
					content: msg.text
				}));
			
			historyToSend.push({ role: 'user', content: userText });

			welcomeScreen.style.display = 'none';
			chatHistory.style.display = 'flex';
			addMessageToUI(userText, 'user');
			chatInput.value = '';
			
			showTypingIndicator();

			try {
				const response = await fetch(BACKEND_URL, {
					method: 'POST',
					headers: { 'Content-Type': 'application/json' },
					body: JSON.stringify({ history: historyToSend })
				});

				const data = await response.json();
				removeTypingIndicator();

				if (!response.ok) throw new Error(data.error || 'Erro desconhecido');
				
				addMessageToUI(data.reply, 'bot');

			} catch (error) {
				console.error('Erro:', error);
				removeTypingIndicator();
				addMessageToUI(error.message || 'Ops! As folhas da FlorIA murcharam. Verifica a ligação.', 'error');
			}
		});
	</script>
</body>
</html>
