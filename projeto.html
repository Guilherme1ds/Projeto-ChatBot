<!DOCTYPE html>
<html lang="pt-br">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>FlorIA Chatbot</title>
	<link rel="stylesheet" href="projeto.css">
	<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
</head>
<body>
	<div class="container">
		<aside class="sidebar">
			<div class="logo-wrapper">
				<img src="img/image-removebg-preview.png" alt="Logo FlorIA" class="logo">
			</div>
		</aside>
		<main class="main-content">
			<div class="theme-icon">
				<span class="material-symbols-outlined">sunny</span>
			</div>
			<div class="mascot">
				<img src="img/mascote planta.png" alt="Mascote FlorIA">
			</div>
			<h1>FlorIA</h1>
			<p class="subtitle">Semeando dados, colhendo resultados.</p>
			<form class="question-form">
				<input type="text" placeholder="Digite sua pergunta">
			</form>
		</main>
	</div>
</body>
</html>
